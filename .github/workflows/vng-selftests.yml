---
name: virtme-ng selftests

"on":
  workflow_dispatch:

permissions:
  contents: read

jobs:
  vng-selftests:
    name: ${{ matrix.distro }} rootfs
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian-10
          - debian-11
          - debian-12
          - debian-13
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-25.10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            busybox-static \
            ca-certificates \
            cpio \
            debian-archive-keyring \
            git \
            make \
            mmdebstrap \
            qemu-system-x86 \
            qemu-utils \
            rsync \
            ubuntu-keyring \
            virtiofsd \
            virtme-ng

      - name: Build ${{ matrix.distro }} rootfs
        run: |
          sudo ./ci/build-rootfs.sh \
            "${{ matrix.distro }}" \
            "${RUNNER_TEMP}/rootfs/${{ matrix.distro }}"

      - name: Import ovpn sources and selftests
        run: |
          ./backports-ctl.sh get-ovpn -t

      - name: Run selftests in ${{ matrix.distro }}
        run: |
          sudo ./ci/run-vng-selftests.sh \
            "${{ matrix.distro }}" \
            "${RUNNER_TEMP}/rootfs/${{ matrix.distro }}" \
            "${GITHUB_WORKSPACE}"
