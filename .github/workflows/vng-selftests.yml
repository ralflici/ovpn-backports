---
name: virtme-ng selftests

"on":
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 2,5"

permissions:
  contents: read

jobs:
  vng-selftests:
    name: ${{ matrix.distro }} rootfs
    runs-on: ubuntu-24.04
    timeout-minutes: 120

    strategy:
      fail-fast: false
      matrix:
        distro:
          - debian-10
          - debian-11
          - debian-12
          - debian-13
          - ubuntu-20.04
          - ubuntu-22.04
          - ubuntu-24.04
          - ubuntu-25.10
          - ubuntu-26.04
          - fedora-44
          - alma-8
          - alma-9
          - alma-10
          - rhel-8
          - rhel-9
          - rhel-10
          - opensuse-leap-15.6
          - opensuse-leap-16.0
          - opensuse-tumbleweed

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            busybox-static \
            ca-certificates \
            cpio \
            debian-archive-keyring \
            dnf \
            git \
            make \
            mmdebstrap \
            qemu-system-x86 \
            qemu-utils \
            rsync \
            ubuntu-keyring \
            virtiofsd \
            virtme-ng

      # RHEL kernels don't support 9p but vng mounts its guesttools using 9p so
      # we have to use a patched version of vng that avoid 9p completely
      - name: Checkout patched virtme-ng
        if: >-
          (startsWith(matrix.distro, 'alma-') ||
          startsWith(matrix.distro, 'rhel-'))
        run: |
          git clone \
            --depth 1 \
            --branch root-guesttools \
            https://github.com/ralflici/virtme-ng.git \
            "${RUNNER_TEMP}/virtme-ng"
          git -C "${RUNNER_TEMP}/virtme-ng" rev-parse HEAD

      - name: Build ${{ matrix.distro }} rootfs
        env:
          # RHEL differs from the public targets: build-rootfs.sh uses these
          # secrets inside a temporary UBI container to authenticate against
          # Red Hat CDN and generate the rootfs.
          RHEL_ORG_ID: ${{ secrets.RHEL_ORG_ID }}
          RHEL_ACTIVATION_KEY: ${{ secrets.RHEL_ACTIVATION_KEY }}
        run: |
          sudo --preserve-env=RHEL_ORG_ID,RHEL_ACTIVATION_KEY \
            ./ci/build-rootfs.sh \
            "${{ matrix.distro }}" \
            "${RUNNER_TEMP}/rootfs/${{ matrix.distro }}"

      - name: Compute rootfs fingerprint
        id: rootfs-fingerprint
        run: |
          # Build-rootfs is the source of truth for package selection. Compute
          # the scheduled-run cache key from the actual kernel it installed.
          fingerprint=$(./ci/rootfs-fingerprint.sh \
            "${{ matrix.distro }}" \
            "${RUNNER_TEMP}/rootfs/${{ matrix.distro }}" \
            "${GITHUB_SHA}")
          echo "hash=${fingerprint}" >> "${GITHUB_OUTPUT}"

      - name: Check previous scheduled result
        if: github.event_name == 'schedule'
        id: selftest-cache
        uses: actions/cache/restore@v5
        with:
          # Scheduled runs only need to rerun compilation + selftests when this
          # exact repo revision has not already passed with the generated
          # target rootfs kernel.
          path: ${{ runner.temp }}/vng-cache/${{ matrix.distro }}
          key: >-
            vng-selftests-${{ matrix.distro }}-${{
            steps.rootfs-fingerprint.outputs.hash }}
          lookup-only: true

      - name: Skip unchanged scheduled target
        if: >-
          github.event_name == 'schedule' &&
          steps.selftest-cache.outputs.cache-hit == 'true'
        run: |
          # The following selftest steps are skipped by their own 'if:'
          # conditions; this step just leaves an explicit log message.
          echo "${{ matrix.distro }} already passed for this rootfs fingerprint"

      - name: Import ovpn sources and selftests
        if: steps.selftest-cache.outputs.cache-hit != 'true'
        run: |
          ./backports-ctl.sh get-ovpn -t

      - name: Run selftests in ${{ matrix.distro }}
        if: steps.selftest-cache.outputs.cache-hit != 'true'
        run: |
          case "${{ matrix.distro }}" in
          alma-*|rhel-*)
            vng="${RUNNER_TEMP}/virtme-ng/vng" ;;
          *)
            vng="$(command -v vng)" ;;
          esac
          sudo env VNG="${vng}" ./ci/run-vng-selftests.sh \
            "${{ matrix.distro }}" \
            "${RUNNER_TEMP}/rootfs/${{ matrix.distro }}" \
            "${GITHUB_WORKSPACE}"

      - name: Record successful scheduled result
        if: >-
          github.event_name == 'schedule' &&
          steps.selftest-cache.outputs.cache-hit != 'true'
        run: |
          # Save a tiny marker only after the scheduled selftests pass.
          cache_dir="${RUNNER_TEMP}/vng-cache/${{ matrix.distro }}"
          mkdir -p "${cache_dir}"
          printf '%s\n' \
            "${{ steps.rootfs-fingerprint.outputs.hash }}" \
            > "${cache_dir}/fingerprint"

      - name: Save successful scheduled result
        if: >-
          github.event_name == 'schedule' &&
          steps.selftest-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/vng-cache/${{ matrix.distro }}
          key: >-
            vng-selftests-${{ matrix.distro }}-${{
            steps.rootfs-fingerprint.outputs.hash }}
